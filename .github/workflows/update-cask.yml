name: Update agentdeck cask

# Agent Deck の最新安定版（releases/latest はプレリリースを返さない）に
# cask を自動追従させる。sha256 はリリース資産の digest をそのまま使うので
# ダウンロード不要。arm64 / x64 の両 dmg が揃っていなければ何もしない
# （cask はデュアルアーチで、両方の sha が必要）。agentdeck 側のリリースは
# 「全資産添付後に draft 公開」なので通常ここは揃っている。

on:
  schedule:
    - cron: '47 */6 * * *' # 6時間ごと（リリース後、最大6時間以内に反映）
  workflow_dispatch: {}     # リリース直後に手動で即時反映も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync the cask with the latest stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          json=$(gh api repos/willink-oss/agentdeck/releases/latest)
          tag=$(jq -r .tag_name <<<"$json")
          ver=${tag#v}
          arm_sha=$(jq -r '.assets[] | select(.name | endswith("-arm64.dmg")) | .digest // empty' <<<"$json")
          x64_sha=$(jq -r '.assets[] | select(.name | endswith("-x64.dmg")) | .digest // empty' <<<"$json")
          arm_sha=${arm_sha#sha256:}; x64_sha=${x64_sha#sha256:}
          if [ -z "$arm_sha" ] || [ -z "$x64_sha" ]; then
            echo "release $tag lacks one of the mac dmgs (arm=$([ -n "$arm_sha" ] && echo yes || echo no) x64=$([ -n "$x64_sha" ] && echo yes || echo no)) — skipping"
            exit 0
          fi
          current=$(sed -nE 's/^  version "(.*)"$/\1/p' Casks/agentdeck.rb)
          if [ "$current" = "$ver" ]; then echo "cask already at $ver"; exit 0; fi
          sed -i -E "s|^  version \".*\"$|  version \"$ver\"|" Casks/agentdeck.rb
          sed -i -E "s|^  sha256 arm:   \".*\",$|  sha256 arm:   \"$arm_sha\",|" Casks/agentdeck.rb
          sed -i -E "s|^         intel: \".*\"$|         intel: \"$x64_sha\"|" Casks/agentdeck.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "agentdeck $ver"
          git push
          echo "cask updated: $current -> $ver (arm+intel)"
