name: Update agentdeck cask

# Agent Deck の最新安定版（releases/latest はプレリリースを返さない）に
# cask を自動追従させる。sha256 はリリース資産の digest をそのまま使うので
# ダウンロード不要。リリース直後に資産が未添付なら何もしない（次回に追従）。
# agentdeck 側のリリースは「全資産添付後に draft 公開」なので通常ここは揃っている。

on:
  schedule:
    - cron: '47 */6 * * *' # 6時間ごと（リリース後、最大6時間以内に反映）
  workflow_dispatch: {}     # リリース直後に手動で即時反映も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Sync the cask with the latest stable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          json=$(gh api repos/willink-oss/agentdeck/releases/latest)
          tag=$(jq -r .tag_name <<<"$json")
          ver=${tag#v}
          asset=$(jq -c '.assets[] | select(.name | endswith("-arm64.dmg"))' <<<"$json")
          if [ -z "$asset" ]; then echo "no dmg asset on $tag yet — skipping"; exit 0; fi
          sha=$(jq -r '.digest // empty' <<<"$asset")
          sha=${sha#sha256:}
          if [ -z "$sha" ]; then echo "asset has no digest — skipping"; exit 0; fi
          current=$(sed -nE 's/^  version "(.*)"$/\1/p' Casks/agentdeck.rb)
          if [ "$current" = "$ver" ]; then echo "cask already at $ver"; exit 0; fi
          sed -i -E "s|^  version \".*\"$|  version \"$ver\"|" Casks/agentdeck.rb
          sed -i -E "s|^  sha256 \".*\"$|  sha256 \"$sha\"|" Casks/agentdeck.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "agentdeck $ver"
          git push
          echo "cask updated: $current -> $ver"
